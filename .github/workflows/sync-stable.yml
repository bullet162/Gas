name: Sync main → stable-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Mirror main to stable-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to stable-backend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:stable-backend --force
